<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - GreenPet</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="stylesheet" href="./css/pages.css">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="header-container">
                <!-- Logo -->
                <a href="index.html" class="site-logo">
                    <img src="./assets/images/logo.svg" alt="GreenPet" style="height: 60px; vertical-align: middle;">
                </a>
            </div>
        </div>
    </header>

    <main class="py-3xl">
        <div class="container">
            <div class="flex justify-center">
                <div class="card" style="width: 100%; max-width: 480px;">
                    <div class="card-header text-center">Quên Mật Khẩu</div>
                    <div class="card-body">
                        <p class="text-secondary text-center mb-lg">
                            Nhập email của bạn và chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.
                        </p>

                        <form id="forgotPasswordForm">
                            <div class="form-group">
                                <label class="form-label form-label-required">Email</label>
                                <input type="email" class="form-control" name="email" required
                                    placeholder="nhapemail@example.com">
                            </div>

                            <button type="submit" class="btn btn-primary w-full mb-md">Gửi Hướng Dẫn</button>

                            <div class="text-center text-sm">
                                <a href="login.html" class="text-primary hover:underline font-medium">← Quay lại Đăng
                                    Nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom text-center">
                © 2026 GreenPet. Thiết kế bền vững vì một hành tinh xanh. 🌿
            </div>
        </div>
    </footer>

    <script src="./js/config.js"></script>
    <script src="./js/ui/dom-helpers.js"></script>
    <script src="./js/ui/ui-components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('forgotPasswordForm');
            if (form) {
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    // Mock success
                    alert('Hướng dẫn đặt lại mật khẩu đã được gửi đến email của bạn! Vui lòng kiểm tra hộp thư.');
                    window.location.href = 'login.html';
                });
            }
        });
    </script>
</body>

</html>
