<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GreenPet</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body>
    <main class="flex items-center justify-center" style="min-height: 100vh; background-color: var(--bg-secondary);">
        <div class="card" style="width: 100%; max-width: 400px; margin: var(--spacing-md);">
            <div class="card-body">
                <div class="text-center mb-xl">
                    <div style="margin-bottom: var(--spacing-md);">
                        <img src="../assets/images/logo.svg" alt="GreenPet" style="height: 80px;">
                    </div>
                    <h1 class="text-2xl font-bold">Admin Portal</h1>
                    <p class="text-sm" style="color: var(--text-secondary);">Đăng nhập để quản lý</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Tên đăng nhập</label>
                        <input type="text" class="form-control" name="username" value="admin" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" name="password" value="admin123" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">Đăng nhập</button>
                </form>

                <div class="divider"></div>

                <div class="text-center text-sm" style="color: var(--text-secondary);">
                    <p>Demo: admin / admin123</p>
                    <a href="../index.html" style="color: var(--color-primary);">← Về trang chủ</a>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/data/storage.js"></script>
    <script src="../js/services/admin-service.js"></script>
    <script src="../js/ui/dom-helpers.js"></script>
    <script>
        DOM.ready(() => {
            // Redirect if already logged in
            if (AdminService.isLoggedIn()) {
                window.location.href = 'index.html';
                return;
            }

            const form = DOM.byId('loginForm');
            DOM.on(form, 'submit', (e) => {
                e.preventDefault();
                const data = DOM.serializeForm(form);

                const result = AdminService.login(data.username, data.password);
                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    alert(result.error);
                }
            });
        });
    </script>
</body>

</html>
