<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng - Admin GreenPet</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/admin-theme.css">
</head>

<body>
    <!-- Admin Header will be rendered by admin-header.js -->
    <div id="admin-header-placeholder"></div>

    <main class="admin-page">
        <div class="container">
            <div class="page-header mb-xl">
                <h1 class="page-title">Quản lý đơn hàng</h1>
            </div>

            <!-- Filter Tabs -->
            <div class="tabs mb-lg">
                <button class="tab-btn active" data-status="all">Tất cả</button>
                <button class="tab-btn" data-status="pending">Chờ xử lý</button>
                <button class="tab-btn" data-status="processing">Đang xử lý</button>
                <button class="tab-btn" data-status="shipping">Đang giao</button>
                <button class="tab-btn" data-status="completed">Hoàn thành</button>
                <button class="tab-btn" data-status="cancelled">Đã hủy</button>
            </div>

            <div class="card">
                <div class="card-body">
                    <div id="loading" class="text-center py-2xl">
                        <div class="spinner"></div>
                    </div>

                    <div id="orderTableContainer" style="display: none;">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Mã đơn</th>
                                    <th>Ngày đặt</th>
                                    <th>Khách hàng</th>
                                    <th>Tổng tiền</th>
                                    <th>Trạng thái</th>
                                    <th width="100">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="orderTableBody">
                                <!-- Data will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .tabs {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 20px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .tab-btn.active {
            background: var(--color-primary);
            color: white;
        }

        .tab-btn:hover:not(.active) {
            background: #f5f5f5;
        }
    </style>

    <script src="../js/config.js"></script>
    <script src="../js/data/storage.js"></script>
    <script src="../js/data/database.js"></script>
    <script src="../js/services/order-service.js"></script>
    <script src="../js/services/admin-service.js"></script>
    <script src="../js/services/order-service.js"></script>
    <script src="../js/ui/dom-helpers.js"></script>
    <script src="../js/ui/admin-header.js"></script>
    <script src="../js/pages/admin-orders.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // AdminHeader handles header
        });
    </script>
</body>

</html>
