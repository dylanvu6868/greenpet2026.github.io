<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Leaf + Paw Icon -->
  <g id="icon">
    <!-- Green leaf shape -->
    <path d="M 25 50 Q 20 42, 25 30 Q 30 20, 38 30 Q 40 35, 38 42 Q 35 50, 25 50 Z" 
          fill="#2d7a3e"/>
    <!-- Leaf vein detail -->
    <line x1="30" y1="30" x2="32" y2="45" stroke="#1f5a2c" stroke-width="1.5"/>
    
    <!-- Paw print pads (4 toe beans) -->
    <ellipse cx="20" cy="32" rx="4.5" ry="6" fill="#3a9e50" transform="rotate(-25 20 32)"/>
    <ellipse cx="18" cy="44" rx="4.5" ry="6" fill="#3a9e50" transform="rotate(-5 18 44)"/>
    <ellipse cx="42" cy="30" rx="4.5" ry="6" fill="#3a9e50" transform="rotate(25 42 30)"/>
    <ellipse cx="44" cy="42" rx="4.5" ry="6" fill="#3a9e50" transform="rotate(5 44 42)"/>
  </g>
  
  <!-- Text: GreenPet -->
  <text x="65" y="52" font-family="'Inter', 'Segoe UI', sans-serif" 
        font-size="36" font-weight="700" fill="#2d7a3e">
    Green<tspan fill="#3a9e50">Pet</tspan>
  </text>
</svg>
